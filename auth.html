<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | Sarees By Kuhu</title>
    <style>
        body { 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .auth-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 350px; 
            text-align: center; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box;
        }
        .btn { 
            width: 100%; 
            padding: 12px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
        }
        .btn:hover { background: #219150; }
        .toggle-link { 
            margin-top: 15px; 
            font-size: 0.9em; 
            color: #2980b9; 
            cursor: pointer; 
            text-decoration: underline; 
        }
        #phone-input-container {
            display: none; /* Hidden by default for Login */
        }
        
        /* Mobile Responsive */
        @media screen and (max-width: 480px) {
            .auth-card {
                width: 90%;
                padding: 25px;
                margin: 20px;
            }
            input, .btn {
                padding: 10px;
            }
            h2 {
                font-size: 1.5em;
            }
        }
        /* ========== MOBILE RESPONSIVE STYLES ========== */
* {
    box-sizing: border-box;
}

/* Mobile Viewport Fix */
html {
    width: 100%;
    overflow-x: hidden;
}

body {
    width: 100%;
    overflow-x: hidden;
}

/* Mobile Styles (up to 768px) */
@media screen and (max-width: 768px) {
    /* Sidebar becomes horizontal top bar */
    .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        padding: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 15px;
    }
    
    .sidebar h2 {
        width: 100%;
        text-align: center;
        margin: 0 0 8px 0;
        font-size: 18px;
    }
    
    .sidebar-link {
        display: inline-block;
        padding: 6px 12px;
        font-size: 12px;
        margin-bottom: 0;
    }
    
    .sidebar hr {
        display: none;
    }
    
    /* Main content adjustment */
    .main-content {
        margin-left: 0;
        padding: 15px;
        width: 100%;
    }
    
    /* Stats grid - single column */
    .stats-grid {
        grid-template-columns: 1fr;
        gap: 10px;
    }
    
    .card {
        padding: 12px;
    }
    
    .card h3 {
        font-size: 12px;
    }
    
    .card p {
        font-size: 20px;
    }
    
    /* Make tables scroll horizontally */
    table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
        font-size: 12px;
    }
    
    th, td {
        padding: 8px 10px;
        font-size: 11px;
    }
    
    /* Product grid - 2 columns on mobile */
    #shop-container {
        gap: 10px;
        padding: 15px;
    }
    
    .product-card {
        width: calc(50% - 10px);
        padding: 10px;
    }
    
    .product-card img {
        height: 120px;
    }
    
    .product-card h3 {
        font-size: 13px;
        margin: 8px 0;
    }
    
    .product-card p {
        font-size: 12px;
    }
    
    .product-card button {
        padding: 6px 10px;
        font-size: 11px;
    }
    
    /* Header responsive */
    header {
        flex-direction: column;
        gap: 8px;
        padding: 10px;
    }
    
    header h1 {
        font-size: 18px;
    }
    
    #search-bar {
        width: 90%;
        padding: 8px;
        font-size: 14px;
    }
    
    /* Category menu */
    .category-nav {
        gap: 8px;
        padding: 8px;
    }
    
    .cat-btn {
        padding: 4px 10px;
        font-size: 11px;
    }
    
    /* Cart drawer */
    .cart-drawer {
        width: 85%;
        right: -85%;
    }
    
    /* Order history cards */
    .order-history-card {
        padding: 12px;
    }
    
    .order-history-header {
        flex-direction: column;
        gap: 5px;
        font-size: 11px;
    }
    
    .order-history-card > div {
        flex-direction: column !important;
    }
    
    .order-history-card > div > div {
        width: 100% !important;
        text-align: left !important;
        margin-bottom: 10px;
    }
    
    /* Tracking info on mobile */
    .tracking-info {
        padding: 8px 10px;
        margin-top: 8px;
    }
    
    .tracking-id {
        font-size: 11px;
        word-break: break-all;
    }
    
    .order-timeline {
        font-size: 9px;
        gap: 4px;
        flex-wrap: wrap;
    }
    
    /* Shipping card on mobile */
    .shipping-card {
        padding: 8px;
        margin-top: 8px;
    }
    
    .shipping-title {
        font-size: 10px;
    }
    
    .shipping-address {
        font-size: 10px;
    }
    
    /* Buttons on mobile */
    .btn, button {
        padding: 6px 10px;
        font-size: 11px;
    }
    
    .checkout-btn, .form-submit-btn {
        padding: 10px;
        font-size: 14px;
    }
    
    /* Bulk actions bar */
    .bulk-actions-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        padding: 10px;
    }
    
    .bulk-actions-bar .selection-info {
        text-align: center;
        font-size: 12px;
    }
    
    /* Stock control */
    .stock-control {
        flex-direction: column;
        gap: 5px;
    }
    
    .stock-control input {
        width: 100%;
    }
    
    .stock-control button {
        width: 100%;
    }
    
    /* Labels for printing on mobile */
    .shipping-label {
        width: 100%;
        min-height: auto;
        padding: 15px;
    }
    
    .shop-name-center {
        font-size: 18px;
        letter-spacing: 2px;
    }
    
    .order-id-center {
        font-size: 12px;
        margin-bottom: 30px;
    }
    
    .buyer-section, .seller-section {
        position: static;
        text-align: left;
        margin-top: 15px;
    }
    
    .buyer-section {
        text-align: right;
    }
    
    .section-title {
        font-size: 11px;
    }
    
    .label-line {
        font-size: 10px;
    }
    
    /* Bulk label grid */
    .label-grid {
        grid-template-columns: 1fr;
        gap: 15px;
    }
    
    .print-label-card {
        min-height: auto;
        padding: 12px;
    }
    
    .print-shop-name {
        font-size: 14px;
    }
    
    .print-order-id {
        font-size: 10px;
        margin-bottom: 20px;
    }
    
    .print-buyer-section {
        text-align: left;
        margin-bottom: 20px;
    }
    
    .print-seller-section {
        margin-top: 15px;
    }
    
    /* User bar */
    .user-bar {
        padding: 8px 12px;
        font-size: 11px;
        text-align: center;
    }
    
    .store-name-header {
        float: none;
        display: block;
        margin-bottom: 5px;
        font-size: 12px;
    }
    
    /* Login card */
    .auth-card, .login-card {
        width: 90%;
        padding: 20px;
        margin: 20px auto;
    }
    
    .auth-card h2, .login-card h2 {
        font-size: 20px;
    }
    
    /* Modal */
    .modal-content {
        width: 90%;
        margin: 20% auto;
        padding: 15px;
    }
    
    /* Footer */
    .footer {
        padding: 20px 15px;
    }
    
    .footer-content {
        flex-direction: column;
        gap: 20px;
        text-align: center;
    }
    
    .footer-section {
        text-align: center;
    }
    
    .footer-section h3 {
        font-size: 14px;
    }
    
    .footer-section p, .footer-section a {
        font-size: 11px;
    }
    
    .copyright {
        font-size: 10px;
    }
    
    /* Notification on mobile */
    .notification {
        min-width: 280px;
        padding: 10px 15px;
        top: 10px;
        right: 10px;
        left: 10px;
        width: auto;
    }
    
    .notification-icon {
        font-size: 22px;
    }
    
    .notification-title {
        font-size: 12px;
    }
    
    .notification-message {
        font-size: 10px;
    }
    
    /* Form inputs */
    input, textarea, select {
        font-size: 14px !important; /* Prevents zoom on iOS */
    }
    
    /* Add product form */
    #section-inventory .card div[style*="grid-template-columns"] {
        grid-template-columns: 1fr !important;
        gap: 8px;
    }
}

/* Tablet Styles (769px to 1024px) */
@media screen and (min-width: 769px) and (max-width: 1024px) {
    .product-card {
        width: calc(33.33% - 20px);
    }
    
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .sidebar {
        width: 200px;
    }
    
    .main-content {
        margin-left: 220px;
    }
    
    .label-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Small phones (up to 480px) */
@media screen and (max-width: 480px) {
    .product-card {
        width: calc(50% - 8px);
    }
    
    .product-card img {
        height: 100px;
    }
    
    .product-card h3 {
        font-size: 11px;
    }
    
    .stats-grid .card p {
        font-size: 18px;
    }
    
    th, td {
        padding: 6px 8px;
        font-size: 10px;
    }
    
    .btn, button {
        padding: 5px 8px;
        font-size: 10px;
    }
    
    .user-bar {
        font-size: 10px;
    }
}

/* Landscape mode for phones */
@media screen and (max-width: 768px) and (orientation: landscape) {
    .sidebar {
        position: sticky;
        top: 0;
        z-index: 100;
    }
    
    .main-content {
        padding: 10px;
    }
    
    .product-card img {
        height: 80px;
    }
}
    </style>
</head>
<body>

<div class="auth-card">
    <h2 id="title">Buyer Login</h2>
    
    <input type="text" id="username" placeholder="Username">
    
    <div id="phone-input-container">
        <input type="tel" id="phone" placeholder="Mobile Number (10 Digits)" maxlength="10">
    </div>
    
    <input type="password" id="password" placeholder="Password">
    
    <button class="btn" id="main-btn" onclick="handleAuth()">Login</button>
    
    <div class="toggle-link" id="toggle-txt" onclick="toggle()">New here? Create an account.</div>
    <br>
    <a href="index.html" style="font-size: 0.8em; color: gray; text-decoration: none;">← Back to Shop</a>
</div>

<script>
    // FIXED: Same as admin.html - works on localhost AND Render
    const API_BASE = window.location.origin;
    let isLoginMode = true;

    function toggle() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "Buyer Login" : "Register Account";
        document.getElementById('main-btn').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('toggle-txt').innerText = isLoginMode ? "New here? Create an account." : "Already have an account? Login.";
        
        // Show/Hide phone field
        document.getElementById('phone-input-container').style.display = isLoginMode ? "none" : "block";
    }

    async function handleAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        const ph = document.getElementById('phone').value.trim();

        if(!u || !p) return alert("Username and Password are required");
        if(!isLoginMode && (!ph || ph.length !== 10)) return alert("Please enter a valid 10-digit mobile number");

        try {
            const response = await fetch(`${API_BASE}/users`);
            const users = await response.json();

            if (isLoginMode) {
                const found = users.find(user => user.username === u && user.password === p);
                if (found) {
                    if (found.status !== 'Verified') {
                        alert("Account Pending Verification. Please contact admin.");
                        return;
                    }
                    localStorage.setItem('user', u);
                    window.location.href = "index.html";
                } else {
                    alert("Invalid username or password");
                }
            } else {
                // REGISTRATION LOGIC
                // 1. Check if Username exists
                if (users.find(user => user.username === u)) {
                    return alert("Username already taken!");
                }
                
                // 2. Check if Phone Number exists (Duplicate Mobile Prevention)
                if (users.find(user => user.phone === ph)) {
                    return alert("This mobile number is already registered!");
                }
                
                // 3. Register New User
                const newUser = { 
                    username: u, 
                    password: p, 
                    phone: ph, 
                    status: 'Pending',
                    id: Date.now(),
                    registeredAt: new Date().toISOString()
                };

                const registerResponse = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(newUser)
                });

                if (registerResponse.ok) {
                    alert("Registered successfully! Please wait for admin approval.");
                    toggle();
                } else {
                    alert("Registration failed. Please try again.");
                }
            }
        } catch (error) {
            console.error("Auth Error:", error);
            alert("Connection error. Ensure your backend server is running.");
        }
    }
</script>
</body>
</html>
