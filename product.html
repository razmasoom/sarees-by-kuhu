<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Product Details | Sarees By Kuhu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f5f5; 
            color: #333; 
        }
        
        /* Header Styles */
        .user-bar {
            background: #131921;
            color: #ccc;
            padding: 8px 50px;
            text-align: right;
            font-size: 14px;
        }
        .user-bar b { color: white; }
        .user-bar a { color: #f0c14b; text-decoration: none; margin-left: 15px; cursor: pointer; font-weight: bold; }
        .store-name-header {
            float: left;
            font-weight: bold;
            color: #f0c14b;
            font-size: 16px;
        }
        
        header { 
            background: #232f3e; 
            color: white; 
            padding: 15px; 
            position: sticky; 
            top: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000; 
        }
        .logo-container { cursor: pointer; display: flex; align-items: center; }
        .store-logo { height: 50px; width: auto; max-width: 180px; object-fit: contain; }
        
        /* Product Detail Page Styles */
        .product-detail-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .product-gallery {
            position: sticky;
            top: 100px;
        }
        
        .main-image {
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #eee;
        }
        
        .thumbnail-list {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        
        .thumbnail:hover, .thumbnail.active {
            border-color: #27ae60;
            transform: scale(1.05);
        }
        
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .product-title {
            font-size: 28px;
            font-weight: bold;
            color: #232f3e;
        }
        
        .product-price {
            font-size: 28px;
            color: #B12704;
            font-weight: bold;
        }
        
        .product-category {
            display: inline-block;
            background: #ecf0f1;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #2c3e50;
        }
        
        .product-stock {
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .in-stock { background: #d4edda; color: #155724; }
        .out-of-stock { background: #f8d7da; color: #721c24; }
        
        .product-description {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            line-height: 1.6;
            color: #444;
        }
        
        .product-description h3 {
            margin-bottom: 10px;
            color: #232f3e;
        }
        
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }
        
        .quantity-selector input {
            width: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }
        
        .add-to-cart-btn {
            background: #f0c14b;
            border: 1px solid #a88734;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        
        .add-to-cart-btn:hover {
            background: #ddb347;
        }
        
        .add-to-cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .back-btn {
            background: #37475a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .cart-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .product-detail-container {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }
            .product-title { font-size: 22px; }
            .product-price { font-size: 24px; }
            .thumbnail { width: 60px; height: 60px; }
            .user-bar { padding: 8px 15px; font-size: 12px; }
        }
        
        .footer {
            background: #232f3e;
            color: #ccc;
            padding: 30px 50px;
            margin-top: 50px;
            text-align: center;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
        }
        .footer-section { flex: 1; min-width: 200px; text-align: left; }
        .footer-section h3 { color: #f0c14b; margin-bottom: 15px; }
        .footer-section a { color: #ccc; text-decoration: none; display: block; margin-bottom: 8px; }
        .copyright { text-align: center; padding-top: 20px; margin-top: 20px; border-top: 1px solid #37475a; font-size: 12px; }
    </style>
</head>
<body>

    <div class="user-bar" id="user-bar">
        <span class="store-name-header">🏪 Sarees By Kuhu</span>
    </div>

    <header>
        <div class="logo-container" onclick="window.location.href='index.html'">
            <img src="logo.png" alt="Sarees By Kuhu" class="store-logo">
        </div>
        <div onclick="window.location.href='index.html'" style="cursor:pointer; font-weight: bold;">
            ← Back to Store
        </div>
    </header>

    <div id="product-detail" class="product-detail-container">
        <div class="product-gallery">
            <img id="mainImage" class="main-image" src="" alt="">
            <div id="thumbnailList" class="thumbnail-list"></div>
        </div>
        <div class="product-info">
            <h1 id="productName" class="product-title"></h1>
            <div>
                <span id="productCategory" class="product-category"></span>
            </div>
            <div id="productPrice" class="product-price"></div>
            <div id="productStock" class="product-stock"></div>
            <div id="productDescription" class="product-description"></div>
            <div class="quantity-selector">
                <label>Quantity:</label>
                <input type="number" id="quantity" value="1" min="1" max="10">
            </div>
            <button id="addToCartBtn" class="add-to-cart-btn">🛒 Add to Cart</button>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>About Us</h3>
                <p>Your trusted online shopping destination for authentic sarees.</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <a href="index.html">Shop Now</a>
                <a href="#" onclick="window.location.href='index.html'">My Orders</a>
            </div>
            <div class="footer-section">
                <h3>Contact Info</h3>
                <p>✉️ Kahkashanp7@gmail.com</p>
                <p>📍 Purnea, Bihar 854302</p>
            </div>
        </div>
        <div class="copyright">
            &copy; 2024 Sarees By Kuhu. All rights reserved.
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentProduct = null;
        
        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        async function loadProduct() {
            if (!productId) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/products`);
                const products = await response.json();
                currentProduct = products.find(p => p.id == productId);
                
                if (!currentProduct) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // Update page title
                document.title = `${currentProduct.name} | Sarees By Kuhu`;
                
                // Set product details
                document.getElementById('productName').textContent = currentProduct.name;
                document.getElementById('productCategory').textContent = currentProduct.category || 'General';
                document.getElementById('productPrice').innerHTML = `₹${currentProduct.price}`;
                
                // Stock status
                const stockElement = document.getElementById('productStock');
                if (currentProduct.stock > 0) {
                    stockElement.innerHTML = `✅ In Stock (${currentProduct.stock} available)`;
                    stockElement.className = 'product-stock in-stock';
                    document.getElementById('addToCartBtn').disabled = false;
                } else {
                    stockElement.innerHTML = '❌ Out of Stock';
                    stockElement.className = 'product-stock out-of-stock';
                    document.getElementById('addToCartBtn').disabled = true;
                }
                
                // Description
                const descriptionHtml = currentProduct.description ? 
                    `<h3>📝 Product Description</h3><p>${currentProduct.description.replace(/\n/g, '<br>')}</p>` : 
                    '<h3>📝 Product Description</h3><p>No description available.</p>';
                document.getElementById('productDescription').innerHTML = descriptionHtml;
                
                // Images gallery
                const images = currentProduct.images && currentProduct.images.length > 0 ? 
                    currentProduct.images : [currentProduct.image || 'https://via.placeholder.com/150'];
                
                const mainImage = document.getElementById('mainImage');
                mainImage.src = images[0];
                mainImage.onclick = () => openFullscreenGallery(images, 0);
                
                // Thumbnails
                const thumbnailList = document.getElementById('thumbnailList');
                thumbnailList.innerHTML = '';
                images.forEach((img, idx) => {
                    const thumb = document.createElement('img');
                    thumb.src = img;
                    thumb.className = 'thumbnail';
                    if (idx === 0) thumb.classList.add('active');
                    thumb.onclick = () => {
                        mainImage.src = img;
                        document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                        thumb.classList.add('active');
                    };
                    thumbnailList.appendChild(thumb);
                });
                
                // Set max quantity
                document.getElementById('quantity').max = currentProduct.stock;
                
            } catch (error) {
                console.error('Error loading product:', error);
                window.location.href = 'index.html';
            }
        }
        
        function openFullscreenGallery(images, startIndex) {
            // Simple fullscreen gallery
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;';
            let currentIndex = startIndex;
            
            const img = document.createElement('img');
            img.src = images[currentIndex];
            img.style.cssText = 'max-width:90%; max-height:80vh; object-fit:contain;';
            
            const counter = document.createElement('div');
            counter.style.cssText = 'color:white; margin-top:15px;';
            counter.textContent = `${currentIndex + 1} / ${images.length}`;
            
            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '❮';
            prevBtn.style.cssText = 'position:absolute; left:20px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:white; border:none; font-size:40px; cursor:pointer; padding:10px 20px; border-radius:50%;';
            prevBtn.onclick = (e) => {
                e.stopPropagation();
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                img.src = images[currentIndex];
                counter.textContent = `${currentIndex + 1} / ${images.length}`;
            };
            
            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = '❯';
            nextBtn.style.cssText = 'position:absolute; right:20px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:white; border:none; font-size:40px; cursor:pointer; padding:10px 20px; border-radius:50%;';
            nextBtn.onclick = (e) => {
                e.stopPropagation();
                currentIndex = (currentIndex + 1) % images.length;
                img.src = images[currentIndex];
                counter.textContent = `${currentIndex + 1} / ${images.length}`;
            };
            
            const closeBtn = document.createElement('div');
            closeBtn.innerHTML = '✕';
            closeBtn.style.cssText = 'position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;';
            closeBtn.onclick = () => modal.remove();
            
            modal.appendChild(img);
            modal.appendChild(counter);
            modal.appendChild(prevBtn);
            modal.appendChild(nextBtn);
            modal.appendChild(closeBtn);
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            
            document.body.appendChild(modal);
        }
        
        function showMessage(message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'cart-message';
            msgDiv.textContent = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }
        
        // Replace the addToCart function in product.html with this:
function addToCart() {
    const quantity = parseInt(document.getElementById('quantity').value);
    
    if (!currentProduct) return;
    if (quantity > currentProduct.stock) {
        showMessage(`Only ${currentProduct.stock} items available in stock!`);
        return;
    }
    
    // Check if user is logged in
    const loggedInUser = localStorage.getItem('user');
    if (!loggedInUser) {
        showMessage('Please login first!');
        setTimeout(() => {
            window.location.href = 'auth.html';
        }, 1500);
        return;
    }
    
    // Get existing cart from localStorage (used across the site)
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    
    // Check if product already in cart
    const existingItem = cart.find(item => item.productId === currentProduct.id);
    if (existingItem) {
        if (existingItem.quantity + quantity > currentProduct.stock) {
            showMessage(`Cannot add more. Only ${currentProduct.stock - existingItem.quantity} more available!`);
            return;
        }
        existingItem.quantity += quantity;
    } else {
        cart.push({
            productId: currentProduct.id,
            name: currentProduct.name,
            price: currentProduct.price,
            quantity: quantity,
            image: currentProduct.images && currentProduct.images[0] ? currentProduct.images[0] : (currentProduct.image || 'https://via.placeholder.com/150')
        });
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    showMessage(`✓ ${currentProduct.name} added to cart!`);
    
    // Update cart count in localStorage for main page
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    localStorage.setItem('cartCount', totalItems);
}
        
        // Check login status for user bar
function checkAuth() {
    const userBar = document.getElementById('user-bar');
    const loggedInUser = localStorage.getItem('user');
    const cartCount = localStorage.getItem('cartCount') || '0';
    
    if (loggedInUser) {
        userBar.innerHTML = `<span class="store-name-header">🏪 Sarees By Kuhu</span>Welcome, <b>${loggedInUser}</b> | 🛒 Cart (<span id="cart-count-header">${cartCount}</span>) | <a href="#" onclick="logout()">Logout</a>`;
    } else {
        userBar.innerHTML = `<span class="store-name-header">🏪 Sarees By Kuhu</span><a href="auth.html">Login / Register</a>`;
    }
    
    // Update cart count display
    const cartCountSpan = document.getElementById('cart-count-header');
    if (cartCountSpan) {
        const updateCount = () => {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCountSpan.textContent = total;
        };
        updateCount();
        
        // Listen for storage changes
        window.addEventListener('storage', updateCount);
    }
}        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
        
        document.getElementById('addToCartBtn').onclick = addToCart;
        checkAuth();
        loadProduct();
    </script>
</body>
</html>
