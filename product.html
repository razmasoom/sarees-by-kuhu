<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Product Details | Sarees By Kuhu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f5f5; 
            color: #333; 
        }
        
        /* Header Styles */
        .user-bar {
            background: #131921;
            color: #ccc;
            padding: 8px 50px;
            text-align: right;
            font-size: 14px;
        }
        .user-bar b { color: white; }
        .user-bar a { color: #f0c14b; text-decoration: none; margin-left: 15px; cursor: pointer; font-weight: bold; }
        .store-name-header {
            float: left;
            font-weight: bold;
            color: #f0c14b;
            font-size: 16px;
        }
        
        header { 
            background: #232f3e; 
            color: white; 
            padding: 15px; 
            position: sticky; 
            top: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000; 
        }
        .logo-container { cursor: pointer; display: flex; align-items: center; }
        .store-logo { height: 50px; width: auto; max-width: 180px; object-fit: contain; }
        
        /* Product Detail Page Styles */
        .product-detail-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .product-gallery {
            position: sticky;
            top: 100px;
        }
        
        .main-image {
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #eee;
            transition: transform 0.3s ease;
        }
        
        .main-image:hover {
            transform: scale(1.02);
        }
        
        .thumbnail-list {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        
        .thumbnail:hover, .thumbnail.active {
            border-color: #27ae60;
            transform: scale(1.05);
        }
        
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .product-title {
            font-size: 28px;
            font-weight: bold;
            color: #232f3e;
        }
        
        .product-price {
            font-size: 28px;
            color: #B12704;
            font-weight: bold;
        }
        
        .product-category {
            display: inline-block;
            background: #ecf0f1;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #2c3e50;
        }
        
        .product-stock {
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .in-stock { background: #d4edda; color: #155724; }
        .out-of-stock { background: #f8d7da; color: #721c24; }
        
        .product-description {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            line-height: 1.6;
            color: #444;
        }
        
        .product-description h3 {
            margin-bottom: 10px;
            color: #232f3e;
        }
        
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }
        
        .quantity-selector input {
            width: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }
        
        .add-to-cart-btn {
            background: #f0c14b;
            border: 1px solid #a88734;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        
        .add-to-cart-btn:hover {
            background: #ddb347;
        }
        
        .add-to-cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .back-btn {
            background: #37475a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .cart-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Fullscreen Gallery Modal */
        .gallery-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .gallery-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .gallery-main-image {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            cursor: zoom-in;
        }
        
        .gallery-main-image.zoomed {
            transform: scale(2);
            cursor: zoom-out;
        }
        
        .gallery-thumbnails {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            overflow-x: auto;
            padding: 10px;
            max-width: 90%;
        }
        
        .gallery-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .gallery-thumb:hover, .gallery-thumb.active {
            border-color: #27ae60;
        }
        
        .gallery-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        
        .gallery-prev, .gallery-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 50px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .gallery-prev { left: 20px; }
        .gallery-next { right: 20px; }
        
        .image-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
        }
        
        @media (max-width: 768px) {
            .product-detail-container {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }
            .product-title { font-size: 22px; }
            .product-price { font-size: 24px; }
            .thumbnail { width: 60px; height: 60px; }
            .user-bar { padding: 8px 15px; font-size: 12px; }
            .gallery-prev, .gallery-next {
                font-size: 30px;
                width: 40px;
                height: 40px;
            }
        }
        
        .footer {
            background: #232f3e;
            color: #ccc;
            padding: 30px 50px;
            margin-top: 50px;
            text-align: center;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
        }
        .footer-section { flex: 1; min-width: 200px; text-align: left; }
        .footer-section h3 { color: #f0c14b; margin-bottom: 15px; }
        .footer-section a { color: #ccc; text-decoration: none; display: block; margin-bottom: 8px; }
        .copyright { text-align: center; padding-top: 20px; margin-top: 20px; border-top: 1px solid #37475a; font-size: 12px; }
    </style>
</head>
<body>

    <div class="user-bar" id="user-bar">
        <span class="store-name-header">🏪 Sarees By Kuhu</span>
    </div>

    <header>
        <div class="logo-container" onclick="window.location.href='index.html'">
            <img src="logo.png" alt="Sarees By Kuhu" class="store-logo" onerror="this.src='https://via.placeholder.com/150x50?text=Sarees+By+Kuhu'">
        </div>
        <div onclick="window.location.href='index.html'" style="cursor:pointer; font-weight: bold;">
            ← Back to Store
        </div>
    </header>

    <div id="product-detail" class="product-detail-container">
        <div class="product-gallery">
            <img id="mainImage" class="main-image" src="" alt="" onclick="openFullscreenGallery()">
            <div id="thumbnailList" class="thumbnail-list"></div>
        </div>
        <div class="product-info">
            <h1 id="productName" class="product-title"></h1>
            <div>
                <span id="productCategory" class="product-category"></span>
            </div>
            <div id="productPrice" class="product-price"></div>
            <div id="productStock" class="product-stock"></div>
            <div id="productDescription" class="product-description"></div>
            <div class="quantity-selector">
                <label>Quantity:</label>
                <input type="number" id="quantity" value="1" min="1" max="10">
            </div>
            <button id="addToCartBtn" class="add-to-cart-btn">🛒 Add to Cart</button>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>About Us</h3>
                <p>Your trusted online shopping destination for authentic sarees.</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <a href="index.html">Shop Now</a>
                <a href="#" onclick="window.location.href='index.html'">My Orders</a>
            </div>
            <div class="footer-section">
                <h3>Contact Info</h3>
                <p>✉️ Kahkashanp7@gmail.com</p>
                <p>📍 Purnea, Bihar 854302</p>
            </div>
        </div>
        <div class="copyright">
            &copy; 2024 Sarees By Kuhu. All rights reserved.
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentProduct = null;
        let currentImages = [];
        let currentImageIndex = 0;
        let isZoomed = false;
        
        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        // ============ FULLSCREEN GALLERY FUNCTIONS ============
        
        function openFullscreenGallery() {
            if (!currentImages || currentImages.length === 0) return;
            
            const modal = document.createElement('div');
            modal.className = 'gallery-modal';
            
            modal.innerHTML = `
                <div class="gallery-container">
                    <span class="gallery-close">&times;</span>
                    <div class="gallery-prev">❮</div>
                    <div class="gallery-next">❯</div>
                    <img id="galleryMainImage" class="gallery-main-image" src="${currentImages[0]}" alt="">
                    <div id="galleryThumbnails" class="gallery-thumbnails"></div>
                    <div id="imageCounter" class="image-counter">1 / ${currentImages.length}</div>
                </div>
            `;
            
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
            
            let currentIdx = 0;
            let zoomed = false;
            const mainImg = modal.querySelector('#galleryMainImage');
            const thumbContainer = modal.querySelector('#galleryThumbnails');
            const counter = modal.querySelector('#imageCounter');
            
            // Create thumbnails
            currentImages.forEach((img, idx) => {
                const thumb = document.createElement('img');
                thumb.src = img;
                thumb.className = 'gallery-thumb';
                if (idx === 0) thumb.classList.add('active');
                thumb.onclick = () => {
                    currentIdx = idx;
                    mainImg.src = currentImages[currentIdx];
                    counter.textContent = `${currentIdx + 1} / ${currentImages.length}`;
                    document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                    if (zoomed) {
                        mainImg.classList.remove('zoomed');
                        zoomed = false;
                    }
                };
                thumbContainer.appendChild(thumb);
            });
            
            // Close button
            modal.querySelector('.gallery-close').onclick = () => {
                modal.remove();
                document.body.style.overflow = 'auto';
            };
            
            // Previous button
            modal.querySelector('.gallery-prev').onclick = (e) => {
                e.stopPropagation();
                currentIdx = (currentIdx - 1 + currentImages.length) % currentImages.length;
                mainImg.src = currentImages[currentIdx];
                counter.textContent = `${currentIdx + 1} / ${currentImages.length}`;
                document.querySelectorAll('.gallery-thumb').forEach((t, i) => {
                    if (i === currentIdx) t.classList.add('active');
                    else t.classList.remove('active');
                });
                if (zoomed) {
                    mainImg.classList.remove('zoomed');
                    zoomed = false;
                }
            };
            
            // Next button
            modal.querySelector('.gallery-next').onclick = (e) => {
                e.stopPropagation();
                currentIdx = (currentIdx + 1) % currentImages.length;
                mainImg.src = currentImages[currentIdx];
                counter.textContent = `${currentIdx + 1} / ${currentImages.length}`;
                document.querySelectorAll('.gallery-thumb').forEach((t, i) => {
                    if (i === currentIdx) t.classList.add('active');
                    else t.classList.remove('active');
                });
                if (zoomed) {
                    mainImg.classList.remove('zoomed');
                    zoomed = false;
                }
            };
            
            // Zoom on click
            mainImg.onclick = (e) => {
                e.stopPropagation();
                if (zoomed) {
                    mainImg.classList.remove('zoomed');
                    zoomed = false;
                } else {
                    mainImg.classList.add('zoomed');
                    zoomed = true;
                }
            };
            
            // Close on background click
            modal.onclick = (e) => {
                if (e.target === modal) {
                    modal.remove();
                    document.body.style.overflow = 'auto';
                }
            };
        }
        
        // ============ LOAD PRODUCT ============
        
        async function loadProduct() {
            if (!productId) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/products`);
                const products = await response.json();
                currentProduct = products.find(p => p.id == productId);
                
                if (!currentProduct) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // Update page title
                document.title = `${currentProduct.name} | Sarees By Kuhu`;
                
                // Set images array
                if (currentProduct.images && currentProduct.images.length > 0) {
                    currentImages = currentProduct.images;
                } else if (currentProduct.image) {
                    currentImages = [currentProduct.image];
                } else {
                    currentImages = ['https://via.placeholder.com/400x400?text=No+Image'];
                }
                
                // Set product details
                document.getElementById('productName').textContent = currentProduct.name;
                document.getElementById('productCategory').textContent = currentProduct.category || 'General';
                document.getElementById('productPrice').innerHTML = `₹${currentProduct.price}`;
                
                // Set main image
                document.getElementById('mainImage').src = currentImages[0];
                
                // Stock status
                const stockElement = document.getElementById('productStock');
                if (currentProduct.stock > 0) {
                    stockElement.innerHTML = `✅ In Stock (${currentProduct.stock} available)`;
                    stockElement.className = 'product-stock in-stock';
                    document.getElementById('addToCartBtn').disabled = false;
                    document.getElementById('quantity').max = currentProduct.stock;
                } else {
                    stockElement.innerHTML = '❌ Out of Stock';
                    stockElement.className = 'product-stock out-of-stock';
                    document.getElementById('addToCartBtn').disabled = true;
                }
                
                // Description
                const descriptionHtml = currentProduct.description ? 
                    `<h3>📝 Product Description</h3><p>${currentProduct.description.replace(/\n/g, '<br>')}</p>` : 
                    '<h3>📝 Product Description</h3><p>No description available.</p>';
                document.getElementById('productDescription').innerHTML = descriptionHtml;
                
                // Thumbnails
                const thumbnailList = document.getElementById('thumbnailList');
                thumbnailList.innerHTML = '';
                currentImages.forEach((img, idx) => {
                    const thumb = document.createElement('img');
                    thumb.src = img;
                    thumb.className = 'thumbnail';
                    if (idx === 0) thumb.classList.add('active');
                    thumb.onclick = () => {
                        document.getElementById('mainImage').src = img;
                        document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                        thumb.classList.add('active');
                    };
                    thumbnailList.appendChild(thumb);
                });
                
                // Update cart count display
                updateCartCountDisplay();
                
            } catch (error) {
                console.error('Error loading product:', error);
                window.location.href = 'index.html';
            }
        }
        
        // ============ CART FUNCTIONS (Same as index.html) ============
        
        function updateCartCountDisplay() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            localStorage.setItem('cartCount', totalItems);
            
            // Update header cart count if exists
            const cartCountSpan = document.getElementById('cart-count-header');
            if (cartCountSpan) {
                cartCountSpan.textContent = totalItems;
            }
        }
        
        function showMessage(message, isError = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'cart-message';
            msgDiv.style.background = isError ? '#dc3545' : '#27ae60';
            msgDiv.textContent = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }
        
        function addToCart() {
            const quantity = parseInt(document.getElementById('quantity').value);
            
            // Validation
            if (isNaN(quantity) || quantity < 1) {
                showMessage('Please enter a valid quantity', true);
                return;
            }
            
            if (!currentProduct) {
                showMessage('Product not found', true);
                return;
            }
            
            if (quantity > currentProduct.stock) {
                showMessage(`Only ${currentProduct.stock} items available in stock!`, true);
                return;
            }
            
            // Check if user is logged in
            const loggedInUser = localStorage.getItem('user');
            if (!loggedInUser) {
                showMessage('Please login first!', true);
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 1500);
                return;
            }
            
            // Get existing cart from localStorage
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            // Check if product already in cart
            const existingIndex = cart.findIndex(item => item.productId === currentProduct.id);
            
            if (existingIndex !== -1) {
                const newQuantity = cart[existingIndex].quantity + quantity;
                if (newQuantity > currentProduct.stock) {
                    showMessage(`Cannot add more. Only ${currentProduct.stock - cart[existingIndex].quantity} more available!`, true);
                    return;
                }
                cart[existingIndex].quantity = newQuantity;
            } else {
                cart.push({
                    productId: currentProduct.id,
                    name: currentProduct.name,
                    price: currentProduct.price,
                    quantity: quantity,
                    image: currentImages[0]
                });
            }
            
            // Save to localStorage
            localStorage.setItem('cart', JSON.stringify(cart));
            
            // Update cart count
            updateCartCountDisplay();
            
            showMessage(`✓ ${quantity} × ${currentProduct.name} added to cart!`);
            
            // Optional: Dispatch event for other pages
            window.dispatchEvent(new CustomEvent('cartUpdated'));
        }
        
        // ============ AUTH FUNCTIONS ============
        
        function checkAuth() {
            const userBar = document.getElementById('user-bar');
            const loggedInUser = localStorage.getItem('user');
            const cartCount = localStorage.getItem('cartCount') || '0';
            
            if (loggedInUser) {
                userBar.innerHTML = `<span class="store-name-header">🏪 Sarees By Kuhu</span>Welcome, <b>${loggedInUser}</b> | 🛒 Cart (<span id="cart-count-header">${cartCount}</span>) | <a href="#" onclick="logout()">Logout</a> | <a href="index.html">🏠 Shop</a>`;
            } else {
                userBar.innerHTML = `<span class="store-name-header">🏪 Sarees By Kuhu</span><a href="auth.html">Login / Register</a> | <a href="index.html">🏠 Shop</a>`;
            }
        }
        
        function logout() {
            localStorage.removeItem('user');
            // Don't clear cart on logout
            window.location.href = 'index.html';
        }
        
        // ============ INITIALIZATION ============
        
        document.getElementById('addToCartBtn').onclick = addToCart;
        checkAuth();
        loadProduct();
        
        // Listen for cart updates from other tabs
        window.addEventListener('storage', (e) => {
            if (e.key === 'cart') {
                updateCartCountDisplay();
            }
        });
    </script>
</body>
</html>
